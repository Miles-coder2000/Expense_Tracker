<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="header-bar">
    <h1>Student Expense Tracker</h1>
    <div class="user-section">
      <span id="userGreeting" class="user-greeting"></span>
      <button id="profileBtn" class="profile-btn">Profile</button>
      <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>
  </div>

  <!-- Dashboard -->
  <section id="dashboard">
    <div class="stat income-box">
      <h3>Income</h3>
      <p id="totalIncome">₱0</p>
    </div>
    <div class="stat expense-box">
      <h3>Expense</h3>
      <p id="totalExpense">₱0</p>
    </div>
    <div class="stat balance-box">
      <h3>Balance</h3>
      <p id="balance">₱0</p>
    </div>
  </section>

  <!-- Form -->
  <form id="transactionForm">
    <select id="type">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
    <input type="number" id="amount" placeholder="Amount" required>
    <input type="text" id="category" placeholder="Category">
    <input type="text" id="description" placeholder="Description">
    <input type="date" id="date">
    <button type="submit">Add</button>
  </form>

  <!-- Search / Filter -->
  <div id="filterBar">
    <input type="text" id="search" placeholder="Search by category or description...">
    <select id="filterType">
      <option value="">All</option>
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
  </div>

  <!-- Chart -->
  <div class="chart-container">
    <canvas id="summaryChart"></canvas>
  </div>

  <!-- Transactions -->
  <div id="transactions"></div>

  <!-- Profile Modal -->
  <div id="profileModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2>Student Profile</h2>
      <form id="profileForm">
        <div class="profile-field">
          <label>Full Name</label>
          <input type="text" id="profileFullName" required>
        </div>
        <div class="profile-field">
          <label>Email</label>
          <input type="email" id="profileEmail" disabled>
        </div>
        <div class="profile-field">
          <label>Student ID</label>
          <input type="text" id="profileStudentId">
        </div>
        <div class="profile-field">
          <label>School/University</label>
          <input type="text" id="profileSchool">
        </div>
        <div class="profile-field">
          <label>Major/Course</label>
          <input type="text" id="profileMajor">
        </div>
        <button type="submit" class="save-profile-btn">Save Profile</button>
      </form>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
